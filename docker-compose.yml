
services:
  product-service:
    build: ./backend/product-service
    ports:
      - "8081:8081"
    networks:
      - ecommerce-network

  order-service:
    build: ./backend/order-service
    ports:
      - "8082:8082"
    networks:
      - ecommerce-network

  user-service:
    build: ./backend/user-service
    ports:
      - "8083:8083"
    networks:
      - ecommerce-network

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8090:8080"
    depends_on:
      - product-service
      - order-service
      - user-service
    networks:
      - ecommerce-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8090
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge